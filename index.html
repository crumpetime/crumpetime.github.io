<head>
  <meta charset="utf-8" />
  <title>placeholder title</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      font-family: "Lato";
    }

    p,
    tr,
    th {
      font-family: "Lato";
    }

    /* Default: right side */
    #infoPanel {
      position: absolute;
      top: 30vh;
      right: 20px;
      width: 320px;
      background: white;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      transition: all 0.25s ease;
    }

    /* When drilling down: left side */

    .info-panel {
      position: absolute;
      top: 30vh;
      width: 320px;
      background: white;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      display: none;
    }

    #stateInfoPanel {
      right: 20px;
    }

    #stateInfoPanel.left-side {
      left: 20px;
    }


    /* County / generic detail (right) */
    #infoPanel {
      right: 20px;
      top: 30vh;
    }

    .map-legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      z-index: 9999;
      pointer-events: none;
      width: 260px;
      /* enough for two columns */
    }

    .legend-title {
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .legend-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 12px;
    }

    .legend-col-header {
      font-weight: 600;
      margin-bottom: 6px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      padding-bottom: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      margin-right: 6px;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .selected-element {
      filter: drop-shadow(0 0 6px rgba(0, 0, 0, 0.35));
      stroke-width: 2px;
      stroke: #ffffff;
    }

    /* Remove default Leaflet tooltip box */
    .city-label-tooltip {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }

    /* Style the text */
    .leaflet-tooltip-right {
      font-family: "Lato";
      font-size: 16px;
      font-weight: 1000;
      padding-bottom: 1px;

      -webkit-text-fill-color: #e5e7eb;
      /* text color */
      -webkit-text-stroke: 0.8px black;



      pointer-events: none;
    }

    .leaflet-tooltip-left {
      font-family: "Lato";
      font-size: 16px;
      font-weight: 800;

      padding-bottom: 1px;
      -webkit-text-fill-color: #e5e7eb;
      /* text color */
      -webkit-text-stroke: 1px black;


      pointer-events: none;
    }

    .city-label.pos-right {
      transform: translate(6px, -50%);
    }

    .city-label.pos-left {
      transform: translate(calc(-100% - 6px), -50%);
    }



    .leaflet-tooltip .leaflet-tooltip-tip,
    .leaflet-tooltip:before,
    .leaflet-tooltip:after {
      display: none !important;
      border: none !important;
      background: none !important;
      box-shadow: none !important;
    }

    .star-icon {
      aspect-ratio: 1;
      width: 8px;
      background: white;
      border: 1px solid black;
      filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.35));
    }
  </style>

        let s = str.toLowerCase()

          .replace(/[^a-z0-9 ]/g, "");

        const endsWithCity = /\bcity$/.test(s);

        s = s.replace(/\bcounty\b/g, "")
          .replace(/\bparish\b/g, "")
          .replace(/\bborough\b/g, "")
          .replace(/\bmunicipality\b/g, "")
          .replace(/\bcensus area\b/g, "")
          .replace(/\breservation\b/g, "");

        if (endsWithCity) s = s.replace(/\bcity\b/g, "") + " city";

        return s.replace(/\s+/g, "");

          });

      function getTrueDistrictWinner(districtName) {
        let d = 0;

        // Find the district entry
        for (const state in DISTRICT_VOTES) {
          if (DISTRICT_VOTES[state][districtName]) {
            const entry = DISTRICT_VOTES[state][districtName];
            const countyList = entry.counties;

            countyList.forEach(countyName => {

              const y1 = f.simData?.byYear?.[1];
              if (!y1) return;

              d += y1.parties.DEMOCRAT || 0;
              r += y1.parties.REPUBLICAN || 0;
            });

        return "TIE";

      /**
       * Count votes for county f over the tick range [startTick, endTick).
       * This is used by both fast-forward and real-time simulation.
       */
      function countVotesInRange(f, startTick, endTick) {
        const isCWI = false;//(f.properties.NAME === "Glascock" && f.properties.STATE_NAME === "Georgia");
        const c = f.counting;
        if (!c || c.done) return;
        if (endTick <= startTick) return;
        //if ((f.simData.byYear[0].parties.DEMOCRAT + f.simData.byYear[0].parties.REPUBLICAN + f.simData.byYear[0].parties.OTHER) == (f.simData.byYear[1].parties.DEMOCRAT + f.simData.byYear[1].parties.REPUBLICAN + f.simData.byYear[1].parties.OTHER) == 0) return;
        let t = startTick;

        // We may cross multiple batches in one range, so loop until we exhaust the range or finish.

        if (isCWI && !c._loggedBatches) {
          console.log("[Glascock] batches:", c.batches);
          c._loggedBatches = true;
        }


        while (t < endTick && !c.done) {
          // Respect county start
          if (t < c.startTick) {
            t = Math.min(endTick, c.startTick);
            continue;
          }

          const batch = c.batches[c.currentBatch];
          if (!batch) {
            c.done = true;
            break;
          }

          const batchStart = c.startTick + batch.delay;
          if (t < batchStart) {
            t = Math.min(endTick, batchStart);
            continue;
          }

          // At this point, we're in a window where this batch is active.
          let windowEnd = endTick;

          // allow trickle batches to run beyond finishTick
          if (batch.trickle) {
            // Let trickle run freely until remaining == 0
            // i.e., do NOT clamp to finishTick
            windowEnd = endTick; // unchanged, but we will override the clamp below
          }

          


          const rem = c.remaining;
          let totalRem = rem.DEMOCRAT + rem.REPUBLICAN + rem.OTHER;
          const final = f.simData.byYear[1].parties;
          const finalTotal = final.DEMOCRAT + final.REPUBLICAN + final.OTHER;



          //console.log("BATCH CHECK",
          //  "batchIndex", c.currentBatch,
          //  "batch.size", batch.size,
          //  "batch.counted", batch.counted,
          //  "batchTotalNow", Math.round(finalTotal * batch.size),
          //  "remaining", rem
          //);

          if (totalRem <= 0) {
            c.done = true;
            break;
          }

          
          


          // If this was a non-trickle batch and we exhausted its share, move on
          if (!batch.trickle) {
            const newTotalRem = rem.DEMOCRAT + rem.REPUBLICAN + rem.OTHER;
            const countedTotalNow = batch.counted;
            const batchTotalNow = Math.round(finalTotal * batch.size);
            if (isCWI) {
              console.log(
                "[Glascock] batch", c.currentBatch,
                "check exhaustion:",
                "countedTotalNow:", countedTotalNow,
                "batchTotalNow:", batchTotalNow,
                "newTotalRem:", newTotalRem
              );
            }

            if (batch.counted >= batchTotalNow || newTotalRem === 0) {
              batch.done = true;
              c.currentBatch++;
              if (c.batches[c.currentBatch]) {
                c.batches[c.currentBatch].counted = 0;
              }

              continue;
            }
          }


          let batchRemaining;
          if (batch.trickle) {
            batchRemaining = totalRem;
          } else {
            const batchTotal = Math.round(finalTotal * batch.size);
            const countedTotal =
              c.counted.DEMOCRAT + c.counted.REPUBLICAN + c.counted.OTHER;

            batchRemaining = batchTotal - batch.counted;
            //console.log("batch size: " + batch.size);
            //console.log("batch total: " + batchTotal);
            //console.log("batch counted: " + batch.counted);
            if (batchRemaining <= 0) {
              if (isCWI) {
                console.log(
                  "[Glascock] skipping batch", c.currentBatch,
                  "batchRemaining:", batchRemaining
                );
              }

              batch.done = true;
              c.currentBatch++;
              continue;
            }
          }

          // How many ticks of this batch are we simulating in this window?
          const ticksAvailable = Math.max(0, windowEnd - t);
          if (ticksAvailable <= 0) break;

          // Effective capacity over this window
          let perTickRate;
          if (batch.trickle) {
            // Use a deterministic per-county trickle rate
            const rng = countyRNG(f.properties.GEOID + "-trickle");
            perTickRate = Math.max(100, Math.floor(rng() * 1000));
          } else {
            perTickRate = c.rate;
          }

          let capacity = perTickRate * ticksAvailable;
          capacity = Math.min(capacity, batchRemaining, totalRem);
          //console.log(batch);
          if (batch.early) {
            //console.log(batchRemaining + " votes remaining");
            capacity = batchRemaining; // count all early votes in one tick
            //console.log("capacity: " + capacity);
            //console.log("total: " + totalRem);
          }
          if (capacity <= 0) {
            // Nothing to do; advance t to windowEnd
            t = windowEnd;
            continue;
          }

          // Apply batch partisan skew
          totalRem = rem.DEMOCRAT + rem.REPUBLICAN + rem.OTHER;
          if (totalRem <= 0) {
            c.done = true;
            break;
          }

          let pD = rem.DEMOCRAT / totalRem;
          let pR = rem.REPUBLICAN / totalRem;
          let pO = rem.OTHER / totalRem;

          if (batch.skew) {
            pD = Math.max(0, pD + batch.skew);
            pR = Math.max(0, pR - batch.skew);
          }

          const pSum = pD + pR + pO;
          pD /= pSum;
          pR /= pSum;
          pO /= pSum;

          const rawD = capacity * pD;
          const rawR = capacity * pR;

          var takeD = Math.min(rem.DEMOCRAT, Math.floor(rawD));
          var takeR = Math.min(rem.REPUBLICAN, Math.floor(rawR));

          const used = takeD + takeR;
          var takeO = Math.min(rem.OTHER, capacity - used);



          // If we had capacity and remaining votes but rounding gave us nothing, force 1 vote
          if (takeD + takeR + takeO === 0 && capacity > 0 && totalRem > 0) {
            // Give 1 vote to the party with the largest remaining pool
            const parties = [
              { key: "DEMOCRAT", rem: rem.DEMOCRAT },
              { key: "REPUBLICAN", rem: rem.REPUBLICAN },
              { key: "OTHER", rem: rem.OTHER }
            ].sort((a, b) => b.rem - a.rem);

            const target = parties[0];
            if (target.rem > 0) {
              if (target.key === "DEMOCRAT") {
                takeD = 1;
              } else if (target.key === "REPUBLICAN") {
                takeR = 1;
              } else {
                // OTHER
                // Note: only if rem.OTHER > 0
                takeO = 1;
              }
            }
          }

          const takenTotal = takeD + takeR + takeO;


          c.counted.DEMOCRAT += Math.min(rem.DEMOCRAT, takeD);
          c.counted.REPUBLICAN += Math.min(rem.REPUBLICAN, takeR);
          c.counted.OTHER += Math.min(rem.OTHER, takeO);
          batch.counted += takenTotal;

          rem.DEMOCRAT -= takeD;
          rem.REPUBLICAN -= takeR;
          rem.OTHER -= takeO;


          if (Math.abs((f.simData.byYear[1].parties.DEMOCRAT + f.simData.byYear[1].parties.REPUBLICAN + f.simData.byYear[1].parties.OTHER) - (f.simData.byYear[0].parties.DEMOCRAT + f.simData.byYear[0].parties.REPUBLICAN + f.simData.byYear[0].parties.OTHER)) < 6) {
            f.simData[1] = f.simData[0];
            c.done = true;
          }



          if (Math.abs(rem.DEMOCRAT + rem.REPUBLICAN + rem.OTHER) <= 5 && 1 == 0) {
            const final = f.simData.byYear[1].parties;
            const finalTotal = final.DEMOCRAT + final.REPUBLICAN + final.OTHER;

            const counted = c.counted.DEMOCRAT + c.counted.REPUBLICAN + c.counted.OTHER;

            const diff = finalTotal - counted;

            // If we’re off by a tiny amount, snap to final
            if (Math.abs(diff) <= 5) {
              // Add the missing vote to the leading party (or DEM by tie-break)
              if (diff > 0) {
                const parties = ["DEMOCRAT", "REPUBLICAN", "OTHER"];
                let leader = "DEMOCRAT";
                let maxVotes = c.counted.DEMOCRAT;

                parties.forEach(p => {
                  if (c.counted[p] > maxVotes) {
                    maxVotes = c.counted[p];
                    leader = p;
                  }
                });

                c.counted[leader] += diff;
              }

              // Write reconciled totals to year 0
              f.simData.byYear[0].parties = {
                DEMOCRAT: c.counted.DEMOCRAT,
                REPUBLICAN: c.counted.REPUBLICAN,
                OTHER: c.counted.OTHER
              };
              f.simData.byYear[0].totalvotes =
                c.counted.DEMOCRAT + c.counted.REPUBLICAN + c.counted.OTHER;
            }


            c.done = true;

          }

          // Advance t to windowEnd (we've consumed this range)
          t = windowEnd;
          if (isCWI) {
            console.log(
              "[Glascock] t:", t,
              "currentBatch:", c.currentBatch,
              "startTick:", c.startTick,
              "endTickArg:", endTick,
              "done:", c.done
            );
          }

        }

        // Update live view (year 0)
        if (!c.done) {
          f.simData.byYear[0].parties = {
            DEMOCRAT: c.counted.DEMOCRAT,
            REPUBLICAN: c.counted.REPUBLICAN,
            OTHER: c.counted.OTHER
          };
          f.simData.byYear[0].totalvotes =
            c.counted.DEMOCRAT + c.counted.REPUBLICAN + c.counted.OTHER;
        } else {
          // Ensure final state is written
          f.simData.byYear[0].parties = {
            DEMOCRAT: c.counted.DEMOCRAT,
            REPUBLICAN: c.counted.REPUBLICAN,
            OTHER: c.counted.OTHER
          };
          f.simData.byYear[0].totalvotes =
            c.counted.DEMOCRAT + c.counted.REPUBLICAN + c.counted.OTHER;
        }
      }
      function getDistrictWinnerFromParties(p) {
        if (p.d > p.r) return "DEM";
        if (p.r > p.d) return "GOP";
        return "Tie";
      }

      function getStateTotals(stateName) {
        let d = 0, r = 0, o = 0, counted = 0, final = 0;

        countiesData.features.forEach(f => {
          if (f.properties.STATE_NAME !== stateName) return;

          const y0 = f.simData?.byYear?.[0];
          const y1 = f.simData?.byYear?.[1];
          if (!y0 || !y1) return;

          d += y0.parties.DEMOCRAT || 0;
          r += y0.parties.REPUBLICAN || 0;
          o += y0.parties.OTHER || 0;

          counted += y0.totalvotes || 0;
          final += y1.totalvotes || 0;
        });

        return { d, r, o, counted, final };
      }

      function getStatePercentReporting(stateName) {
        const totals = getStateTotals(stateName);
        if (!totals.final) return "0%";

        const pct = (totals.counted / totals.final) * 100;

        if (pct >= 99) return ">99%";
        if (pct >= 95) return ">95%";
        return Math.round(pct) + "%";
      }

      function getStatePercentReportingNumber(stateName) {
        const totals = getStateTotals(stateName);
        if (!totals.final) return 0;
        const pct = (totals.counted / totals.final) * 100;
        return Math.round(pct);
      }


      function getLiveLeader(stateName) {
        let d = 0, r = 0;

        countiesData.features.forEach(f => {
          if (f.properties.STATE_NAME !== stateName) return;
          const y0 = f.simData?.byYear?.[0];
          if (!y0) return;

          d += y0.parties.DEMOCRAT || 0;
          r += y0.parties.REPUBLICAN || 0;
        });

        if (d > r) return "DEM";
        if (r > d) return "GOP";
        return "TIE";
      }


      function getTrueWinner(stateName) {
        let d = 0, r = 0;

        countiesData.features.forEach(f => {
          if (f.properties.STATE_NAME !== stateName) return;
          const y1 = f.simData?.byYear?.[1];
          if (!y1) return;

          d += y1.parties.DEMOCRAT || 0;
          r += y1.parties.REPUBLICAN || 0;
        });

        if (d > r) return "DEM";
        if (r > d) return "GOP";
        return "TIE";
      }

      function getStateRemainingVotes(stateName) {
        let remD = 0, remR = 0, remO = 0;

        countiesData.features.forEach(f => {
          if (f.properties.STATE_NAME !== stateName) return;
          const rem = f.counting?.remaining;
          if (!rem) return;

          remD += rem.DEMOCRAT || 0;
          remR += rem.REPUBLICAN || 0;
          remO += rem.OTHER || 0;
        });

        return { remD, remR, remO };
      }



      function shouldAutoCallState(stateName) {
        if (called_states[stateName]) return false;

        const totals = getStateTotals(stateName);
        const countedD = totals.d;
        const countedR = totals.r;

        const { remD, remR, remO } = getStateRemainingVotes(stateName);

        const trueWinner = getTrueWinner(stateName);
        const liveLeader = getLiveLeader(stateName);


        // if 0 votes are left, just call it
        if ((remD + remR + remO) < 1) {
          return true;
        }

        //console.log((remD + remR + remO) +  " remaining in " + stateName);
        // If live leader doesn't match true winner, never call yet
        if (trueWinner !== liveLeader) return false;

        // Compute maximum possible votes for each candidate
        const maxPossibleD = countedD + remD + remR + remO;
        const maxPossibleR = countedR + remD + remR + remO;

        // If DEM is leading, check if GOP can still catch up
        if (liveLeader === "DEM") {
          if (maxPossibleR <= countedD) return true;
        }

        // If GOP is leading, check if DEM can still catch up
        if (liveLeader === "GOP") {
          if (maxPossibleD <= countedR) return true;
        }

        return false;
      }

      }

      async function loadCensusDemographics() {
        const YEAR = 2024;
        //const FALLBACK_YEAR = 2020;
        const VARS = [
          // -----------------------------
          // CORE POPULATION STRUCTURE
          // -----------------------------

          "B01003_001E", // Total population
          "B29001_001E", // Voting-age population (VAP)

          // -----------------------------
          // RACE & ETHNICITY
          // -----------------------------

          "B02001_002E", // White alone
          "B02001_003E", // Black or African American alone
          "B02001_005E", // Asian alone
          "B03003_003E", // Hispanic or Latino (of any race)

          // -----------------------------
          // AGE STRUCTURE
          // -----------------------------

          "B29001_002E", // Age 18–29 (VAP subset)
          "B29001_003E", // Age 30–44
          "B29001_004E", // Age 45–64
          "B29001_005E", // Age 65+

          "B01002_001E", // Median age

          // -----------------------------
          // EDUCATION
          // -----------------------------

          "B15003_001E", // total population 25+
          "B15003_017E", // high school graduate
          "B15003_021E", // associate's degree
          "B15003_022E", // bachelor's degree
          "B15003_023E", // master's degree
          "B15003_024E", // professional degree
          "B15003_025E", // doctorate degree
          "B15003_018E",
          "B15003_020E",
          "B15003_019E",

          // -----------------------------
          // INCOME & POVERTY
          // -----------------------------

          "B19013_001E", // Median household income
          "B17001_002E", // Population below poverty line

          // -----------------------------
          // HOUSING & MOBILITY
          // -----------------------------

          "B25003_001E", // Total housing units
          "B25003_002E", // Owner-occupied units
          "B25003_003E", // Renter-occupied units

          "B25077_001E", // Median home value

          "B07003_001E", // Total population for mobility
          "B07003_004E", // Lived in same house 1 year ago
          "B07003_007E", // Moved from different county (domestic migration)
          "B07003_008E", // Moved from abroad (international migration)

          // -----------------------------
          // NATIVITY & LANGUAGE
          // -----------------------------

          "B05002_013E", // Foreign-born population
          "B06007_005E", // Speak English less than "very well"

          // -----------------------------
          // EMPLOYMENT & INDUSTRY
          // -----------------------------

          "C24050_002E", // Agriculture, forestry, fishing, hunting, mining
          "C24050_003E", // Construction
          "C24050_004E", // Manufacturing
          "C24050_005E", // Wholesale trade
          "C24050_006E", // Retail trade
          "C24050_007E", // Transportation & warehousing
          "C24050_008E", // Information
          "C24050_009E", // Finance & insurance
          "C24050_010E", // Professional, scientific, technical services
          "C24050_011E", // Educational services
          "C24050_012E", // Health care & social assistance
          "C24050_013E", // Arts, entertainment, recreation, accommodation, food services
          "C24050_014E", // Public administration

          // -----------------------------
          // HOUSING AGE (useful for suburban/exurban modeling)
          // -----------------------------

          "B25034_010E", // Housing built 2000–2009
          "B25034_011E", // Housing built 2010 or later


        ];

        const url =
          `https://api.census.gov/data/${YEAR}/acs/acs5?` +
          `get=NAME,${VARS.join(",")}&for=county:*`;

        const urlCT = `https://api.census.gov/data/2020/acs/acs5?get=NAME,${VARS.join(",")}&for=county:*&in=state:09`;


        const res = await fetch(url);
        const json = await res.json();

        const header = json[0];
        const rows = json.slice(1);

        const demoLookup = {};
        rows.forEach(r => {
          const obj = {};
          header.forEach((h, i) => obj[h] = r[i]);

          const state = obj.state.padStart(2, "0");
          const county = obj.county.padStart(3, "0");
          const fips = state + county;

          demoLookup[fips] = {
            vap: Number(obj["B29001_001E"]),
            population: Number(obj["B01003_001E"]),

            // -----------------------------
            // RACE
            // -----------------------------
            white: Number(obj["B02001_002E"]),
            black: Number(obj["B02001_003E"]),
            asian: Number(obj["B02001_005E"]),
            hispanic: Number(obj["B03003_003E"]),

            // -----------------------------
            // AGE STRUCTURE
            // -----------------------------
            pop18to29: Number(obj["B29001_002E"]),
            pop30to44: Number(obj["B29001_003E"]),
            pop45to64: Number(obj["B29001_004E"]),
            pop65over: Number(obj["B29001_005E"]),
            medianAge: Number(obj["B01002_001E"]),



            // -----------------------------
            // EDUCATION (correct B15003 indices)
            // -----------------------------
            // B15003_001E = total population 25+
            educationHS:
              (Number(obj["B15003_017E"]) + Number(obj["B15003_018E"])) / Number(obj["B15003_001E"]),

            educationBA:
              Number(obj["B15003_022E"]) / Number(obj["B15003_001E"]),

            educationGrad:
              (Number(obj["B15003_023E"]) +
                Number(obj["B15003_024E"]) +
                Number(obj["B15003_025E"])) /
              Number(obj["B15003_001E"]),

            educationCollege:
              (Number(obj["B15003_023E"]) +
                Number(obj["B15003_024E"]) +
                Number(obj["B15003_025E"])) /
              Number(obj["B15003_001E"]),

            // -----------------------------
            // INCOME & POVERTY
            // -----------------------------

            const DEFAULT_BATCHES = [
              { size: 0.25, delay: 0, skew: +0.09, early: true},  // early vote: 
              { size: 0.5, delay: 1, skew: -0.07 },  // election day:
              { size: 0.20, delay: 180, skew: +0.02 },  // late mail:

              { size: 0.00, delay: 800, skew: +0.05, trickle: true } //late mail

            function initCountingModel() {
              let gft = 0
              countiesData.features.forEach(f => {
                const final = f.simData?.byYear?.[1]?.parties;
                if (!final) return;

                const rng = countyRNG(f.properties.GEOID);

                const baseRate = 1000;
                const variability = 0.4;
                const rate = Math.max(20, baseRate * (0.5 + rngFloat(rng, variability)));

                const stateName = f.properties.STATE_NAME;
                const stateStart = STATE_START_TIMES[stateName] || 0;

                const pop = f.demographics?.population || 1;
                const popFactor = Math.min(1, Math.log10(pop) / 6);

                const baseDelay = rng() * 60;
                const sizeDelay = popFactor * 30;
                const countyDelay = Math.floor(baseDelay + sizeDelay);

                const lagFrequency = Math.floor(rng() * 200) + 150;
                const lagDuration = Math.floor(rng() * 10) + 5;


                // 1. Copy default batches
                let batches = DEFAULT_BATCHES.map(b => ({ ...b }));

                // 2. Randomize batch sizes slightly (±10%) — keep fractional
                for (const b of batches) {
                  const scale = 1 + (rngFloat(rng, 0.2) - 0.1);
                  b.size = b.size * scale;   
                }

                // 3. Renormalize so sizes sum to 1.0 — keep fractional
                const sumSizes = batches.reduce((s, b) => s + b.size, 0);
                for (const b of batches) {
                  b.size = b.size / sumSizes;   
                }


                // Create counting object
                f.counting = {
                  rate,
                  counted: { DEMOCRAT: 0, REPUBLICAN: 0, OTHER: 0 },
                  remaining: {
                    DEMOCRAT: final.DEMOCRAT,
                    REPUBLICAN: final.REPUBLICAN,
                    OTHER: final.OTHER
                  },
                  lag: {
                    frequency: lagFrequency,
                    duration: lagDuration,
                    remaining: 0
                  },
                  startTick: stateStart + countyDelay,
                  //batches: DEFAULT_BATCHES.map(b => ({ ...b, counted: 0, done: false })),
                  batches: batches.map(b => ({ ...b, counted: 0, done: false })),
                  currentBatch: 0,
                  done: false,
                  finishTick: 0
                };

                // Inline finishTick calculation
                const totalVotes = final.DEMOCRAT + final.REPUBLICAN + final.OTHER;
                const ticksForMainBatches = Math.ceil(totalVotes / rate);

                let maxDelay = 0;
                for (const b of f.counting.batches) {
                  maxDelay = Math.max(maxDelay, b.delay);
                }

                const trickleTicks = 10000;

                f.counting.finishTick =
                  f.counting.startTick + maxDelay + ticksForMainBatches + trickleTicks;

                if (f.counting.finishTick > gft) { gft = f.counting.finishTick };
                // Initialize year 0
                f.simData.byYear[0] = {
                  parties: { DEMOCRAT: 0, REPUBLICAN: 0, OTHER: 0 },
                  totalvotes: 0
                };
              });
              return gft;
            }

            const GLOBAL_FINISH_TICK = initCountingModel();


            function computeNextEventTick(f, tick) {
              const c = f.counting;
              if (!c || c.done) return Infinity;

              const events = [];

              // 1. County start
              if (tick < c.startTick) {
                events.push(c.startTick);
              }

              // 2. Batch start
              const batch = c.batches[c.currentBatch];
              if (batch) {
                const batchStart = c.startTick + batch.delay;
                if (tick < batchStart) events.push(batchStart);
              }

              // 3. Lag start
              if (c.lag && !isFastForwarding) {
                const nextLagStart = tick + (c.lag.frequency - (tick % c.lag.frequency));
                events.push(nextLagStart);
              }

              // 4. Lag end
              if (c.lag && c.lag.remaining > 0) {
                events.push(tick + c.lag.remaining);
              }

              // 5. County finish
              const rem = c.remaining;
              const totalRem = rem.DEMOCRAT + rem.REPUBLICAN + rem.OTHER;
              if (totalRem === 0) {
                events.push(tick); // already done
              }

              return Math.min(...events);
            }

      function formatCallTime(tick) {
        if (tick == null || tick >= 2000000) return "";

        // Canonical start is UTC
        const startUTC = new Date(SIM_START_TIME);

        // Add ticks (1 tick = 1 minute)
        const callUTC = new Date(startUTC.getTime() + tick * SIM_MS_PER_TICK);

        // Convert UTC → ET (UTC-5)
        //const ET_OFFSET = -5;
        //const callET = new Date(callUTC.getTime() + ET_OFFSET * 3600_000);
        const callET = new Date(callUTC.getTime() - 5 * 3600_000);

        // Extract components
        const month = callET.toLocaleString("en-US", { month: "short" }); // "Nov"
        const day = callET.getDate();                                     // 5
        const hours = callET.getHours();
        const minutes = callET.getMinutes().toString().padStart(2, "0");

        const hour12 = ((hours + 11) % 12) + 1;
        const ampm = hours >= 12 ? "PM" : "AM";

        return `${hour12}:${minutes} ${ampm} ET on ${month} ${day}`;
      }


      /* ============================================================
         RNG + VOTE CALCULATION
      ============================================================ */
      const SWING_MODEL = [2024, 2024]; //model is broken because data that isn't 2024 doesn't work, so just leave it like this ig
      const SW_MULT = 1;
      const BASE_ELECT = 2024;
      const RNG_SEED = 1234312908745690890890819035;
      const PV_ADJ = 0;

      function countyRNG(countyID) {
        return new Math.seedrandom(`${RNG_SEED}-${countyID}`);
      }

      function rngFloat(rng, max) {
        return rng() * max;
      }

      function q(x) {
        return Math.round(x * 1e9) / 1e9;

      function demographicInfluence(f) {
        if (!f.demographics) {
          return { d: 0, r: 0, o: 0 };
        }

        const d = f.demographics;
        const pop = d.population || 1;
        d.industryTotal =
          d.industry.agriculture +
          d.industry.construction +
          d.industry.manufacturing +
          d.industry.retail +
          d.industry.info +
          d.industry.finance +
          d.industry.professional +
          d.industry.education +
          d.industry.healthcare +
          d.industry.hospitality +
          d.industry.publicAdmin;

        d.mobilityTotal =
          d.stayedPut +
          d.movedDomestic +
          d.movedInternational;

        const suburbanPeak = 325;
        const maxDensity = 10000;

        // Normalize percentages
        const vars = {
          // -----------------------------
          // RACE & ETHNICITY
          // -----------------------------
          pctWhite: (d.white || 0) / pop,
          pctBlack: (d.black || 0) / pop,
          pctAsian: (d.asian || 0) / pop,
          pctHispanic: (d.hispanic || 0) / pop,

          // -----------------------------
          // AGE STRUCTURE
          // -----------------------------
          pct18to29: (d.pop18to29 || 0) / pop,
          pct30to44: (d.pop30to44 || 0) / pop,
          pct45to64: (d.pop45to64 || 0) / pop,
          pct65over: (d.pop65over || 0) / pop,

          medianAge: d.medianAge || 0,

          // -----------------------------
          // EDUCATION
          // -----------------------------
          educationCollege: d.educationCollege || 0,
          educationHS: (d.educationHS || 0),
          educationBA: (d.educationBA || 0),
          educationGrad: (d.educationGrad || 0),

          // -----------------------------
          // INCOME & POVERTY
          // -----------------------------
          medianIncome: d.medianIncome || 0,
          pctPoverty: (d.poverty || 0) / (d.population || 1),

          // -----------------------------
          // HOUSING & MOBILITY
          // -----------------------------
          pctRenters: (d.renterOccupied || 0) / (d.housingUnits || 1),
          pctHomeowners: (d.ownerOccupied || 0) / (d.housingUnits || 1),

          medianHomeValue: d.medianHomeValue || 0,

          pctMovedDomestic: (d.movedDomestic || 0) / (d.mobilityTotal || 1),
          pctMovedInternational: (d.movedInternational || 0) / (d.mobilityTotal || 1),
          pctStayedPut: (d.stayedPut || 0) / (d.mobilityTotal || 1),

          density: d.density || 0,

          densityLow: Math.pow(Math.max(0, (suburbanPeak - d.density) / suburbanPeak), 2),
          densityHigh: Math.pow(Math.max(0, (d.density - suburbanPeak) / (maxDensity - suburbanPeak)), 2),

          // -----------------------------
          // NATIVITY & LANGUAGE
          // -----------------------------
          pctForeignBorn: (d.foreignBorn || 0) / (d.population || 1),
          pctLimitedEnglish: (d.limitedEnglish || 0) / (d.population || 1),

          // -----------------------------
          // INDUSTRY / EMPLOYMENT
          // -----------------------------
          pctAgriculture: (d.industry.agriculture || 0) / (d.industryTotal || 1),
          pctManufacturing: (d.industry.manufacturing || 0) / (d.industryTotal || 1),
          pctRetail: (d.industry.retail || 0) / (d.industryTotal || 1),
          pctProfessional: (d.industry.professional || 0) / (d.industryTotal || 1),
          pctEducation: (d.industry.education || 0) / (d.industryTotal || 1),
          pctHealthcare: (d.industry.healthcare || 0) / (d.industryTotal || 1),
          pctPublicAdmin: (d.industry.publicAdmin || 0) / (d.industryTotal || 1),

          // -----------------------------
          // HOUSING AGE (suburban/exurban growth)
          // -----------------------------
          pctNewHousing: (d.newHousing || 0) / (d.housingUnits || 1),
        };

        // Accumulators
        let adjD = 0;
        let adjR = 0;
        let adjO = 0;

        const s = STATE_RELIGION_BASELINE[f.properties.STATE_NAME];

        if (s) {
          adjR += 0.12 * s.evangelical;
          adjD += 0.10 * s.unaffiliated;
          adjD += 0.02 * s.mainline;
          adjR += 0.02 * s.catholic; // mild effect
        }


        // Apply configured weights
        for (const key in DEMO_WEIGHTS) {
          const w = DEMO_WEIGHTS[key];
          const value = vars[key];
          //console.log(key);
          //console.log(vars["pctWhite"])
          //console.log(DEMO_WEIGHTS["pctWhite"])
          if (value === undefined) {
            console.warn("value for key " + key + " could not be found");
            continue;
          }
          // Centering + scaling (optional)
          let centered = value;
          if (w.center !== undefined && w.scale !== undefined) {
            centered = (value - w.center) / w.scale;
          }

          if (w.d == undefined || w.r == undefined || w.o == undefined) {
            console.warn("d/r/o influence values for key " + key + " could not be found");
          }

          const strengthD = w.d || 0;
          const strengthR = w.r || 0;
          const strengthO = w.o || 0;


          if (!w.absolute) {
            adjD += strengthD * Math.tanh(centered);
            adjR += strengthR * Math.tanh(centered);
            adjO += strengthO * Math.tanh(centered);
            //console.log("absolute flag missing or false for " + key);
          }
          else {
            //if(key == "pctWhite"){console.log("pw")}
            //if(key == "pctWhite"){console.log("raw adjustments for " + key + ": " + "D: " + strengthD + " R: " + strengthR + " O: " + strengthO + ", centered value = " + centered);}

            //let adjDtemp;
            //let adjRtemp;
            //let adjOtemp;


            if (strengthD < 0) { adjD += Math.min(strengthD * Math.tanh(centered), 0) }
            else { adjD += Math.max(strengthD * Math.tanh(centered), 0) }

            if (strengthR < 0) { adjR += Math.min(strengthR * Math.tanh(centered), 0) }
            else { adjR += Math.max(strengthR * Math.tanh(centered), 0) }

            if (strengthO < 0) { adjO += Math.min(strengthO * Math.tanh(centered), 0) }
            else { adjO += Math.max(strengthO * Math.tanh(centered), 0) }

            //adjD += adjDtemp;
            //adjR += adjRtemp;
            //adjO += adjOtemp;

            //if(key == "pctWhite"){console.log("adjustments after absolute for " + key + ": " + "D: " + adjDtemp + " R: " + adjRtemp + " O: " + adjOtemp)};
          }
        }



        const geoid = getCountyByName(f.properties.STATE_NAME, f.properties.NAMELSAD).properties.GEOID;

        for (const zone of regionalZones) {
          const countyCentroid = countyCentroids[f.properties.GEOID];

          const dist = turf.distance(
            turf.point(countyCentroid),
            turf.point(zone.centroid),
            { units: "kilometers" }
          );

          if (dist > zone.radiusKm) continue;

          // Gaussian falloff
          const sigma = zone.radiusKm / 2;
          const weight = Math.exp(-(dist * dist) / (2 * sigma * sigma));

          adjD += zone.boostDEM * weight;
          adjR += (zone.boostGOP || -zone.boostDEM) * weight;
          adjO += (zone.boostOTH || 0) * weight;
        }



        return {
          d: q(adjD),
          r: q(adjR),
          o: q(adjO)
        };
      }

      function calculateVoteTotal(f) {
        if (!f.simData || !f.simData.byYear) return;

        const base = f.simData.byYear[BASE_ELECT];
        const y1 = f.simData.byYear[SWING_MODEL[0]];
        const y0 = f.simData.byYear[SWING_MODEL[1]];
        if (!base || !y0 || !y1) return;

        const baseTotal = base.totalvotes || 1;
        const y0Total = y0.totalvotes || 1;
        const y1Total = y1.totalvotes || 1;

        const baseShare = {
          d: base.parties.DEMOCRAT / baseTotal,
          r: base.parties.REPUBLICAN / baseTotal,
          o: (base.parties.OTHER || 0) / baseTotal
        };

        const y0Share = {
          d: y0.parties.DEMOCRAT / y0Total,
          r: y0.parties.REPUBLICAN / y0Total,
          o: (y0.parties.OTHER || 0) / y0Total
        };

        const y1Share = {
          d: (y1.parties.DEMOCRAT / y1Total) * (1 + PV_ADJ),
          r: (y1.parties.REPUBLICAN / y1Total) * (1 - PV_ADJ),
          o: (y1.parties.OTHER || 0) / y1Total
        };

        const swing = {
          d: (y0Share.d - y1Share.d) * SW_MULT,
          r: (y0Share.r - y1Share.r) * SW_MULT,
          o: (y0Share.o - y1Share.o) * SW_MULT
        };

        const rng = countyRNG(f.properties.GEOID);
        const noise = rngFloat(rng, 0.01) - 0.005;

        const demo = demographicInfluence(f);

        const finalShare = {
          d: q(Math.max(0, baseShare.d + swing.d + noise + demo.d)),
          r: q(Math.max(0, baseShare.r + swing.r - noise + demo.r)),
          o: q(Math.max(0, baseShare.o + swing.o + demo.o))
        };

        const sum = finalShare.d + finalShare.r + finalShare.o;
        finalShare.d /= sum;
        finalShare.r /= sum;
        finalShare.o /= sum;


        // const totalVotes = Math.round(baseTotal * (1 + demoFactor * rngFloat(rng, 0.015)));

        const totalVotes = Math.round(baseTotal * (1 + rngFloat(rng, 0.02)));

        f.simData.byYear[1] = {
          parties: {
            DEMOCRAT: Math.round(finalShare.d * totalVotes),
            REPUBLICAN: Math.round(finalShare.r * totalVotes),
            OTHER: Math.round(finalShare.o * totalVotes)
          },
          totalvotes: totalVotes,
          swing,
          baseShare,
          y0Share,
          y1Share,
          demoInfluence: demo
        };
      }

      function buildLegend() {
        const legend = document.getElementById("map-legend");

        // These bins match getFillColour() thresholds
        const republicanBins = [
          { label: "R+0", color: getFillColour(0.001) },
          { label: "R+1", color: getFillColour(0.011) },
          { label: "R+5", color: getFillColour(0.051) },
          { label: "R+10", color: getFillColour(0.11) },
          { label: "R+20", color: getFillColour(0.21) },
          { label: "R+30", color: getFillColour(0.31) },
          { label: "R+40", color: getFillColour(0.41) },
        ];

        const democraticBins = [
          { label: "D+0", color: getFillColour(-0.001) },
          { label: "D+1", color: getFillColour(-0.011) },
          { label: "D+5", color: getFillColour(-0.051) },
          { label: "D+10", color: getFillColour(-0.11) },
          { label: "D+20", color: getFillColour(-0.21) },
          { label: "D+30", color: getFillColour(-0.31) },
          { label: "D+40", color: getFillColour(-0.41) },
        ];

          html = `<div class="legend-title">Swing</div>`;
        }
        else {
          html = `<div class="legend-title">Lead</div>`;
        }

        html += `
          <div class="legend-columns">
            <div>
              <div class="legend-col-header">Democratic</div>
              ${democraticBins.map(b => `
                <div class="legend-item">
                  <span class="legend-color" style="background:${b.color}"></span>
                  ${b.label}
                </div>
              `).join("")}
            </div>

              <div class="legend-col-header">Republican</div>
              ${republicanBins.map(b => `
                <div class="legend-item">
                  <span class="legend-color" style="background:${b.color}"></span>
                  ${b.label}
                </div>
              `).join("")}
            </div>

        `;

      function deselectState() {
        if (highlightedStateLayer && highlightedStateLayer._path) {
          highlightedStateLayer._path.classList.remove("selected-element");
        }
        highlightedStateLayer = null;
        selectedState = null;
      }

      function deselectCounty() {
        if (highlightedCountyLayer && highlightedCountyLayer._path) {
          highlightedCountyLayer._path.classList.remove("selected-element");
          highlightedCountyLayer.bringToBack();
        }
        highlightedCountyLayer = null;
        selectedCounty = null;
      }



      function hideOverlappingTooltips() {
        const tooltips = Array.from(document.querySelectorAll('.leaflet-tooltip.city-label-tooltip'));
        const boxes = tooltips.map(t => t.getBoundingClientRect());

        const hidden = new Set();

        for (let i = 0; i < boxes.length; i++) {
          if (hidden.has(i)) continue;

          for (let j = i + 1; j < boxes.length; j++) {
            if (hidden.has(j)) continue;

            const a = boxes[i];
            const b = boxes[j];

            const overlap =
              !(a.right < b.left ||
                a.left > b.right ||
                a.bottom < b.top ||
                a.top > b.bottom);

            if (overlap) {
              // hide the tooltip DOM
              tooltips[j].style.opacity = 0;
              hidden.add(j);

              const marker = tooltipPoints.get(tooltips[j].textContent);

              if (marker) {
                // circleMarker
                if (marker.setStyle) {
                  marker.setStyle({ opacity: 0, fillOpacity: 0 });
                }

                // normal marker
                if (marker.setOpacity) {
                  marker.setOpacity(0);
                }
              }
            }

          }
        }

        // show all non-hidden
        tooltips.forEach((t, i) => {
          if (!hidden.has(i)) {

            // show tooltip DOM
            t.style.opacity = 1;

            // find the marker associated with this tooltip
            const marker = tooltipPoints.get(t.textContent);

            if (marker) {
              // circleMarker (SVG)
              if (marker.setStyle) {
                marker.setStyle({ opacity: 1, fillOpacity: 1 });
              }

              // normal L.marker (HTML <img> or <div>)
              if (marker.setOpacity) {
                marker.setOpacity(1);
              }
            }
          }
        });

      }


      map.on('zoomend moveend', hideOverlappingTooltips);


      map.on("click", () => {
        if (!countiesLayer) {
          deselectState();
        }
        deselectCounty();
      });


      map.on("load", () => {
        buildLegend();
      });

      map.on("zoomend", () => {
        if (map.getZoom() <= 4) {
          tooltips.forEach(t => {
            t.setOpacity(0);
            t.update()
          });
        }
        else {
          tooltips.forEach(t => {
            t.setOpacity(1)
            t.update()
          });
        }
      });




      function getFillColour(margin) {
        return (
          margin < -0.4 ? "#002B84" :
            margin < -0.3 ? "#0645B4" :
              margin < -0.2 ? "#1666CB" :
                margin < -0.1 ? "#4389E3" :
                  margin < -0.05 ? "#86B6F2" :
                    margin < -0.01 ? "#B9D7FF" :
                      margin < -0.005 ? "#D3E7FF" :
                        margin < 0 ? "#D9E8FA" :
                          margin > 0.4 ? "#800000" :
                            margin > 0.3 ? "#AA0000" :
                              margin > 0.2 ? "#D40000" :
                                margin > 0.1 ? "#CC2F4A" :
                                  margin > 0.05 ? "#E27F90" :
                                    margin > 0.01 ? "#F2B3BE" :
                                      margin > 0.005 ? "#FFCDD1" :
                                        margin > 0 ? "#F0CED4" :
                                          margin == 0 ? "#D4C4DC" :
                                            "green");
      }

      function updateCountyColor(f, year) {
        if (!f._layer) return;

        const data = f.simData?.byYear?.[year];
        if (!data) return;

        let dem = data.parties.DEMOCRAT || 0;
        let rep = data.parties.REPUBLICAN || 0;
        let total = data.parties.REPUBLICAN + data.parties.DEMOCRAT + data.parties.OTHER || 1;

        let margin = (rep - dem) / total;

        if (viewSwing) {
          const base = f.simData?.byYear?.[2024];
          if (!base) return;

          const baseDem = base.parties.DEMOCRAT || 0;
          const baseRep = base.parties.REPUBLICAN || 0;
          const baseTotal = base.parties.REPUBLICAN + base.parties.DEMOCRAT + base.parties.OTHER || 1;

          const currDemShare = dem / total;
          const currRepShare = rep / total;

          const baseDemShare = baseDem / baseTotal;
          const baseRepShare = baseRep / baseTotal;

          // swing in margin
          margin = (currRepShare - currDemShare) - (baseRepShare - baseDemShare);
        }

        f._layer.setStyle({
          fillColor: getFillColour(margin),
          fillOpacity: 0.7
        });

        if (data.totalvotes === 0) {
          f._layer.setStyle({ fillColor: "#888888" });
        }
      }





      function updateStateColor(stateFeature, year) {
        let dem = 0, rep = 0, total = 0;

        countiesData.features.forEach(f => {
          const d = f.simData?.byYear?.[year];
          if (!d) return;
          if (f.properties.STATE_NAME !== stateFeature.properties.NAME) return;

          dem += d.parties.DEMOCRAT || 0;
          rep += d.parties.REPUBLICAN || 0;
          total += d.totalvotes || 0;
        });

        if (total === 0) return;

        const margin = (rep - dem) / total;

        const baseColor = getFillColour(margin);

        const isCalled = called_states[stateFeature.properties.NAME];

        // Always set the base fill color
        stateFeature._layer.setStyle({
          fillColor: baseColor,
          fillOpacity: 0.7
        });

        // Access the underlying SVG path
        const path = stateFeature._layer && stateFeature._layer._path;
        if (!path) return;

        if (isCalled) {
          return;
        }

        // --- UNCALLED STATE: apply per-state stripe pattern ---

        const stateName = stateFeature.properties.NAME;
        const patternId = `uncalledStripes-${stateName.replace(/\s+/g, "_")}`;

        // Create pattern only once
        const svg = map.getPanes().overlayPane.querySelector("svg");
        if (!svg) return;

        let pattern = document.getElementById(patternId);

        if (!pattern) {
          // Create pattern once
          svg.insertAdjacentHTML("beforeend", `
            <defs>
              <pattern id="${patternId}" patternUnits="userSpaceOnUse"
                      width="8" height="8" patternTransform="rotate(45)">
                <rect width="4" height="8" fill="${baseColor}"></rect>
              </pattern>
            </defs>
          `);

          pattern = document.getElementById(patternId);
        } else {
          // Update stripe color every tick
          const rect = pattern.querySelector("rect");
          if (rect) rect.setAttribute("fill", baseColor);
        }



        // Apply the pattern fill
        path.setAttribute("fill", `url(#${patternId})`);



      }




      function getPercentReporting(f) {
        const y0 = f.simData?.byYear?.[0];
        const y1 = f.simData?.byYear?.[1];
        if (!y0 || !y1) return "0%";

        const reported = y0.totalvotes || 0;
        const final = y1.totalvotes || 1;

        const pct = (reported / final) * 100;

        if (pct >= 99) return ">99%";
        if (pct >= 95) return ">95%";

        return Math.round(pct) + "%";
      }

      function renderCountyPanel(f) {
        const props = f.properties;
        const y0 = f.simData?.byYear?.[0];
        const y1 = f.simData?.byYear?.[1];

        if (!y0 || !y1) {
          infoPanel.innerHTML = `<h3>${props.NAMELSAD}</h3><p>No data available.</p>`;
          return;
        }

        const pct = getPercentReporting(f);

        const d0 = y0.parties.DEMOCRAT || 0;
        const r0 = y0.parties.REPUBLICAN || 0;
        const o0 = y0.parties.OTHER || 0;
        const total0 = y0.totalvotes || 0;

        // Compute shares
        const dShare = total0 ? (d0 / total0) * 100 : 0;
        const rShare = total0 ? (r0 / total0) * 100 : 0;
        const oShare = total0 ? (o0 / total0) * 100 : 0;

        // Build sortable party list
        const parties = [
          {
            name: DEM_CANDIDATE_NAME,
            votes: d0,
            share: dShare,
            color: DEM_UI_COLOUR_1
          },
          {
            name: GOP_CANDIDATE_NAME,
            votes: r0,
            share: rShare,
            color: GOP_UI_COLOUR_1
          },
          {
            name: OTH_CANDIDATE_NAME,
            votes: o0,
            share: oShare,
            color: "#6b7280"
          }
        ];

        // Sort by vote share descending
        parties.sort((a, b) => b.share - a.share);

        // Build bar chart HTML
        let barsHTML = "";
        parties.forEach(p => {
          barsHTML += `
      <div style="margin-bottom: 10px;">
        <div style="display:flex; justify-content:space-between;">
          <span style="color:${p.color};">${p.name}</span>
          <span>${Math.floor(p.votes).toLocaleString()} (${p.share.toFixed(1)}%)</span>
        </div>
        <div style="background:#e5e7eb; height:10px; border-radius:4px;">
          <div style="
            width:${p.share}%;
            height:10px;
            background:${p.color};
            border-radius:4px;
          "></div>
        </div>
      </div>
    `;
        });

        function replaceLowerCase(match, p1, p2, p3, offset, string) {
          return p1 + p2.toUpperCase() + p3;
        }

        const namel = props.NAMELSAD.replace(/(^.*\s)([a-z])(.*$)/, replaceLowerCase);

        // Final panel HTML
        infoPanel.innerHTML = `
    <h3 style="margin-bottom: 6px;">${namel}</h3> 

    <div style="margin-bottom: 12px; font-size: 14px;">
      <strong>Est. ${pct} counted</strong><br>
      <span style="color: #666;">
        ${Math.floor(total0).toLocaleString()} of ${y1.totalvotes.toLocaleString()} votes counted
      </span>
    </div>

    <div style="font-size: 14px;">
      ${barsHTML}
    </div>
  `;
      }




      function showCountyInfo(feature) {
        selectedCounty = feature;




        renderCountyPanel(feature);
        infoPanel.style.display = "block";
        //console.log(feature.layer)
        if (highlightedCountyLayer && highlightedCountyLayer._path) {
          highlightedCountyLayer._path.classList.remove("selected-element");
          highlightedCountyLayer.bringToBack();
        }

        if (feature._layer && feature._layer._path) {
          highlightedCountyLayer = feature._layer;
          highlightedCountyLayer._path.classList.add("selected-element");
          highlightedCountyLayer.bringToFront();
        }




      }

      function resolveCityLabelCollisions() {
        const labels = Array.from(document.querySelectorAll('.city-label'));

        // Stable ordering: alphabetical (or use dataset.population)
        labels.sort((a, b) => {
          const na = a.textContent;
          const nb = b.textContent;
          return na.localeCompare(nb);
        });

        // Reset all labels to visible + right side
        labels.forEach(l => {
          l.style.opacity = 1;
          l.classList.remove('pos-left');
          l.classList.add('pos-right');
          if (tooltipPoints[l.textContent] != null) {
            tooltipPoints[l.textContent].opacity = 1;
          }
          //console.log(tooltipPoints);
        });

        const placed = [];

        function overlaps(a, b) {
          return !(
            a.right < b.left ||
            a.left > b.right ||
            a.bottom < b.top ||
            a.top > b.bottom
          );
        }

        for (const label of labels) {
          // Try right side
          let box = label.getBoundingClientRect();
          let collision = placed.some(p => overlaps(box, p));

          if (collision) {
            // Try left side
            label.classList.remove('pos-right');
            label.classList.add('pos-left');

            box = label.getBoundingClientRect();
            collision = placed.some(p => overlaps(box, p));

            if (collision) {
              // No room → hide
              if (tooltipPoints[label.textContent] != null) {
                tooltipPoints[label.textContent].opacity = 0;
              }

              label.style.opacity = 0;
              continue;
            }
          }

          // Accept placement
          placed.push(box);
        }
      }


      function showCountiesForState(stateFeature) {
        const stateFP = stateFeature.properties.STATEFP;

        map.removeLayer(statesLayer);
        //backButton.style.display = "block";

        if (cityLabelLayer) {
          map.removeLayer(cityLabelLayer);
        }


        if (countiesLayer) {
          map.removeLayer(countiesLayer);
        }

        const filteredLayers = countiesData.features
          .filter(f => f.properties.STATEFP === stateFP)
          .map(f => f._layer);

        countiesLayer = L.layerGroup(filteredLayers).addTo(map);

        const bounds = L.featureGroup(filteredLayers).getBounds();
        map.fitBounds(bounds);

        cityLabelLayer = L.geoJSON(CITY_POINTS, {
          filter: function (feature, layer) {
            if (!selectedState) return false;
            if (!countiesLayer) return false;

            if (selectedState.properties.STUSPS.toUpperCase() == feature.properties.state.toUpperCase()) {
              return true;
            }
          },
          pointToLayer: function (feature, latlng) {

            let marker;

            // Create marker (circle or star)
            if (!feature.properties.capital) {
              marker = L.circleMarker(latlng, {
                radius: 4,
                fillColor: "#fff",
                color: "#000",
                weight: 1,
                fillOpacity: 1,
                zIndexOffset: -1,
                pane: "tooltipPane"
              });
            } else {
              marker = L.marker(latlng, {
                icon: L.divIcon({ className: "star-icon" })
              });
            }

            // Bind tooltip directly to the marker
            marker.bindTooltip(feature.properties.name, {
              permanent: true,
              direction: 'right',
              className: "city-label-tooltip city-label pos-right",
              offset: [6, 0]
            });

            // Store marker to manipulate it later
            tooltipPoints.set(feature.properties.name, marker);

            return marker;   // IMPORTANT: L.geoJSON will add it to the map
          }

        }).addTo(map);

      }
